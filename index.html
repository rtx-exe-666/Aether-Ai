<script>
/* ═══════════════════════ SHOOTING STARS ═══════════════════════ */
(function(){
  const c=document.getElementById('stars');
  const ctx=c.getContext('2d');
  let raf;
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  const stars=Array.from({length:220},()=>({
    x:Math.random()*c.width,y:Math.random()*c.height,
    r:Math.random()*1.2+.2,a:Math.random()*.7+.15,
    spd:Math.random()*.02+.004,dir:Math.random()>.5?1:-1
  }));
  const shoots=[];let tick=0;
  function spawn(){
    const ang=(Math.random()*45+15)*Math.PI/180,spd=Math.random()*10+4;
    shoots.push({x:Math.random()*c.width*1.2-c.width*.1,y:Math.random()*c.height*.55-30,
      vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
      len:Math.random()*120+60,a:1,w:Math.random()*1.8+.5,
      clr:Math.random()>.5?'#00f5d4':'#a78bfa',dec:Math.random()*.02+.01});
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a+=s.spd*s.dir;if(s.a>.92||s.a<.1)s.dir*=-1;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,220,255,${s.a})`;ctx.fill();
    });
    tick++;if(tick%55===0)spawn();
    for(let i=shoots.length-1;i>=0;i--){
      const s=shoots[i];
      const tx=s.x-s.vx*(s.len/10),ty=s.y-s.vy*(s.len/10);
      const g=ctx.createLinearGradient(tx,ty,s.x,s.y);
      g.addColorStop(0,'transparent');
      g.addColorStop(.7,s.clr+Math.floor(s.a*85).toString(16).padStart(2,'0'));
      g.addColorStop(1,`rgba(255,255,255,${s.a*.9})`);
      ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(s.x,s.y);
      ctx.strokeStyle=g;ctx.lineWidth=s.w;ctx.lineCap='round';ctx.stroke();
      ctx.beginPath();ctx.arc(s.x,s.y,s.w*2.2,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.a*.85})`;ctx.fill();
      s.x+=s.vx;s.y+=s.vy;s.a-=s.dec;
      if(s.a<=0||s.x>c.width+120||s.y>c.height+120)shoots.splice(i,1);
    }
    raf=requestAnimationFrame(draw);
  }
  draw();
})();

/* ═══════════════════════ LIVE EARTH ═══════════════════════ */
(function(){
  const CONTINENTS=[
    [[72,-140],[68,-135],[70,-125],[68,-80],[60,-64],[50,-55],[44,-66],[42,-70],[25,-80],[20,-90],[15,-87],[8,-77],[10,-85],[20,-105],[25,-110],[32,-117],[38,-122],[48,-124],[55,-130],[60,-142],[68,-166],[70,-163],[72,-140]],
    [[12,-72],[10,-62],[5,-50],[0,-50],[-5,-35],[-15,-39],[-23,-43],[-35,-55],[-40,-62],[-55,-67],[-55,-72],[-45,-75],[-30,-71],[-18,-70],[-5,-81],[5,-77],[10,-75],[12,-72]],
    [[70,-25],[68,15],[60,28],[55,22],[48,22],[44,28],[37,37],[35,27],[37,-9],[43,-9],[44,0],[48,-5],[52,5],[55,8],[58,5],[60,-4],[70,-25]],
    [[37,-5],[37,37],[22,37],[15,42],[12,44],[0,42],[-10,40],[-18,35],[-35,18],[-35,28],[-28,32],[-10,32],[0,32],[10,24],[22,37],[30,32],[35,37],[37,-5]],
    [[70,30],[68,90],[70,140],[65,170],[55,160],[40,143],[25,122],[10,104],[0,100],[8,77],[22,68],[25,57],[37,55],[45,60],[55,60],[60,30],[70,30]],
    [[-15,130],[-13,136],[-12,142],[-25,153],[-38,147],[-38,140],[-32,115],[-22,114],[-18,122],[-15,130]],
    [[83,-60],[83,-25],[72,-25],[72,-52],[75,-70],[80,-73],[83,-60]],
  ];
  const GLATS=[-60,-30,0,30,60],GLONS=[-150,-120,-90,-60,-30,0,30,60,90,120,150,180];
  const CITIES=[[51,0],[40,-74],[35,139],[28,77],[31,121],[-34,-58],[55,37],[-33,151],[19,-99],[1,103]];
  const c=document.getElementById('earth');
  const ctx=c.getContext('2d');
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const size=76;c.width=size*dpr;c.height=size*dpr;ctx.scale(dpr,dpr);
  const cx=size/2,cy=size/2,R=size/2-5;
  let rot=0;
  function proj(lat,lon){
    const la=lat*Math.PI/180,lo=lon*Math.PI/180+rot;
    return{x:cx+R*Math.cos(la)*Math.sin(lo),y:cy-R*Math.sin(la),z:R*Math.cos(la)*Math.cos(lo)};
  }
  function strokePts(pts,color,lw){
    ctx.beginPath();let up=true;
    for(const p of pts){if(p.z>=0){up?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);up=false;}else up=true;}
    ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.stroke();
  }
  function frame(){
    ctx.clearRect(0,0,size,size);
    const atm=ctx.createRadialGradient(cx,cy,R-2,cx,cy,R+10);
    atm.addColorStop(0,'rgba(0,245,212,0)');atm.addColorStop(.5,'rgba(0,245,212,0.1)');atm.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(cx,cy,R+10,0,Math.PI*2);ctx.fillStyle=atm;ctx.fill();
    const base=ctx.createRadialGradient(cx-R*.32,cy-R*.32,0,cx,cy,R);
    base.addColorStop(0,'rgba(18,30,72,.98)');base.addColorStop(1,'rgba(3,6,20,.99)');
    ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fillStyle=base;ctx.fill();
    ctx.save();ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.clip();
    for(const la of GLATS)strokePts(Array.from({length:121},(_,i)=>proj(la,-180+i*3)),'rgba(0,245,212,0.1)',.4);
    for(const lo of GLONS)strokePts(Array.from({length:61},(_,i)=>proj(-90+i*3,lo)),'rgba(0,245,212,0.1)',.4);
    strokePts(Array.from({length:181},(_,i)=>proj(0,-180+i*2)),'rgba(0,245,212,0.32)',.9);
    strokePts(Array.from({length:61},(_,i)=>proj(-90+i*3,0)),'rgba(168,85,247,0.26)',.7);
    for(const cont of CONTINENTS){
      ctx.beginPath();cont.forEach(([la,lo],i)=>{const p=proj(la,lo);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});ctx.closePath();
      ctx.fillStyle='rgba(0,245,212,0.08)';ctx.fill();ctx.strokeStyle='rgba(0,245,212,0.5)';ctx.lineWidth=.7;ctx.stroke();
    }
    for(const[la,lo]of CITIES){const p=proj(la,lo);if(p.z>0){
      const g2=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,5);g2.addColorStop(0,'rgba(0,245,212,0.35)');g2.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();
      ctx.beginPath();ctx.arc(p.x,p.y,1.4,0,Math.PI*2);ctx.fillStyle='rgba(0,245,212,0.9)';ctx.fill();
    }}
    ctx.save();ctx.translate(cx,cy);ctx.rotate(rot*.6);
    ctx.beginPath();ctx.ellipse(0,0,R+3,R*.28,0,0,Math.PI*2);ctx.strokeStyle='rgba(0,245,212,0.22)';ctx.lineWidth=.8;ctx.stroke();ctx.restore();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(-rot*.4);
    ctx.beginPath();ctx.ellipse(0,0,R*.28,R+3,Math.PI/2,0,Math.PI*2);ctx.strokeStyle='rgba(168,85,247,0.2)';ctx.lineWidth=.7;ctx.stroke();ctx.restore();
    ctx.restore();
    ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.strokeStyle='rgba(0,245,212,0.4)';ctx.lineWidth=1;ctx.stroke();
    const spec=ctx.createRadialGradient(cx-R*.38,cy-R*.38,0,cx-R*.2,cy-R*.2,R*.6);
    spec.addColorStop(0,'rgba(255,255,255,0.1)');spec.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fillStyle=spec;ctx.fill();
    rot+=.0045;requestAnimationFrame(frame);
  }
  frame();
})();

/* ═══════════════════════ 3D TILT ═══════════════════════ */
const panel=document.getElementById('panel');
panel.addEventListener('mousemove',e=>{
  if(window.innerWidth<600)return;
  const r=panel.getBoundingClientRect();
  const x=((e.clientY-r.top)/r.height-.5)*7;
  const y=((e.clientX-r.left)/r.width-.5)*-9;
  panel.style.transform=`perspective(1400px) rotateX(${x}deg) rotateY(${y}deg)`;
});
panel.addEventListener('mouseleave',()=>{panel.style.transform='';});

/* ═══════════════════════ CHAT LOGIC ═══════════════════════ */
// ── HARDCODED API KEY ──
const API_KEY = 'sk-4aa763b7596749699cffb7023fe53558';

let history=[];
let msgCount=1;

// Auto-activate chat on load
window.addEventListener('load',()=>{
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('chat-screen').style.display='block';
  addMessage('ai',"Greetings. I am Aether — your advanced AI agent powered by Google Gemini. I'm completely free to use. What shall we explore today?");
});

function addMessage(role,text){
  const msgs=document.getElementById('msgs');
  const row=document.createElement('div');
  row.className=`mrow ${role}`;
  row.innerHTML=`<div class="mav ${role}">${role==='ai'?'AE':'U'}</div><div class="bub ${role}">${text.replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(row);
  msgs.scrollTo({top:msgs.scrollHeight,behavior:'smooth'});
  if(role==='ai'){msgCount++;document.getElementById('msg-count').textContent=msgCount;}
}

function showTyping(){
  const msgs=document.getElementById('msgs');
  const row=document.createElement('div');
  row.id='typing-row';row.className='mrow ai';
  row.innerHTML=`<div class="mav ai">AE</div><div class="bub ai"><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`;
  msgs.appendChild(row);
  msgs.scrollTo({top:msgs.scrollHeight,behavior:'smooth'});
}
function hideTyping(){const t=document.getElementById('typing-row');if(t)t.remove();}

async function sendMessage(){
  const inp=document.getElementById('inp');
  const text=inp.value.trim();
  if(!text)return;
  addMessage('usr',text);
  history.push({role:'user',parts:[{text}]});
  inp.value='';inp.style.height='auto';
  document.getElementById('chr').textContent='0';
  document.getElementById('send-btn').disabled=true;
  showTyping();
  try{
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system_instruction:{parts:[{text:'You are Aether, a sophisticated and elegant AI agent. You are helpful, insightful, and speak with quiet confidence. Keep responses clear and well-structured. You were created by Kuldeep Singh.'}]},
        contents:history
      })
    });
    const data=await res.json();
    if(data.error){hideTyping();addMessage('ai',`⚠ Error: ${data.error.message}`);return;}
    const reply=data.candidates?.[0]?.content?.parts?.[0]?.text??'⚠ No response received.';
    history.push({role:'model',parts:[{text:reply}]});
    hideTyping();addMessage('ai',reply);
  }catch(e){hideTyping();addMessage('ai','⚠ Network error. Please check your connection and API key.');}
  finally{document.getElementById('send-btn').disabled=false;}
}

// Input listeners
document.getElementById('inp').addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,120)+'px';
  document.getElementById('chr').textContent=this.value.length;
  document.getElementById('send-btn').disabled=!this.value.trim();
});
document.getElementById('inp').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
});
</script>
